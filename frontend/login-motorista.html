<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar como Motorista - Locadora App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="cabecalho">
    <h1>Entrar como Motorista</h1>
    <p class="subtitulo">Use seu e-mail e senha para acessar o painel</p>
  </header>

  <main class="conteudo">
    <p class="voltar"><a href="/">← Voltar</a></p>

    <div id="msg-erro" class="msg-erro" style="display: none;"></div>

    <form class="formulario formulario-login" id="form-login">
      <fieldset class="grupo-campos">
        <div class="campo">
          <label for="email">E-mail *</label>
          <input type="email" id="email" name="email" required placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="campo campo-senha">
          <label for="senha">Senha *</label>
          <div class="input-senha-wrap">
            <input type="password" id="senha" name="senha" required placeholder="Sua senha" autocomplete="current-password">
            <button type="button" class="toggle-senha" aria-label="Mostrar senha" data-target="senha" title="Mostrar senha">👁</button>
          </div>
        </div>
      </fieldset>

      <p class="esqueci-senha"><a href="/esqueci-senha-motorista.html">Esqueci minha senha</a></p>

      <div class="acoes-formulario">
        <button type="submit" class="botao-enviar">Entrar</button>
      </div>
    </form>

    <p class="link-cadastro">
      Ainda não tem conta? <a href="/cadastro-motorista.html">Cadastre-se como motorista</a>
    </p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const erro = params.get('erro');
    const msgErro = document.getElementById('msg-erro');
    const mensagens = {
      campos: 'Preencha e-mail e senha.',
      credenciais: 'E-mail ou senha incorretos. Tente novamente.',
      entrar: 'Faça login para acessar esta página.'
    };
    if (erro && mensagens[erro]) {
      msgErro.textContent = mensagens[erro];
      msgErro.style.display = 'block';
    }

    document.getElementById('form-login').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn = this.querySelector('button[type="submit"]');

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      msgErro.style.display = 'none';

      try {
        const res = await fetch('/api/login-motorista', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();

        if (res.ok && data.sucesso) {
          window.location.href = data.redirecionar;
        } else {
          msgErro.textContent = data.erro || 'Erro ao fazer login.';
          msgErro.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Entrar';
        }
      } catch (err) {
        msgErro.textContent = 'Erro de conexão. Tente novamente.';
        msgErro.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });

    document.querySelectorAll('.toggle-senha').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.target;
        const input = document.getElementById(id);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.textContent = '👁';
        btn.title = isPassword ? 'Ocultar senha' : 'Mostrar senha';
        btn.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
      });
    });
  </script>
</body>
</html>
