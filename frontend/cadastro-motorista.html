<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Motorista - Locadora App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="cabecalho">
    <h1>Cadastro de Motorista</h1>
    <p class="subtitulo">Preencha seus dados para acessar veículos disponíveis</p>
  </header>

  <main class="conteudo">
    <p class="voltar"><a href="/">← Voltar</a> | <a href="/login-motorista">Já tem conta? Entrar</a></p>

    <form class="formulario" action="/api/motoristas" method="POST">
      <fieldset class="grupo-campos">
        <legend>Dados pessoais</legend>
        <div class="campo">
          <label for="nome_completo">Nome completo *</label>
          <input type="text" id="nome_completo" name="nome_completo" required placeholder="Como no RG" maxlength="150">
        </div>
        <div class="campo">
          <label for="cpf">CPF *</label>
          <input type="text" id="cpf" name="cpf" required placeholder="Apenas números (11 dígitos)" pattern="[0-9]{11}" maxlength="11" inputmode="numeric">
        </div>
        <div class="campo">
          <label for="rg">RG *</label>
          <input type="text" id="rg" name="rg" required placeholder="Documento de identidade" maxlength="20">
        </div>
        <div class="campo">
          <label for="data_nascimento">Data de nascimento *</label>
          <input type="date" id="data_nascimento" name="data_nascimento" required>
        </div>
      </fieldset>

      <fieldset class="grupo-campos">
        <legend>Contato</legend>
        <div class="campo">
          <label for="email">E-mail *</label>
          <input type="email" id="email" name="email" required placeholder="seu@email.com">
        </div>
        <div class="campo">
          <label for="telefone">Telefone *</label>
          <input type="tel" id="telefone" name="telefone" required placeholder="(11) 3333-4444">
        </div>
        <div class="campo">
          <label for="whatsapp">WhatsApp *</label>
          <input type="tel" id="whatsapp" name="whatsapp" required placeholder="(11) 99999-8888">
        </div>
      </fieldset>

      <fieldset class="grupo-campos">
        <legend>CNH</legend>
        <div class="campo">
          <label for="numero_cnh">Número da CNH *</label>
          <input type="text" id="numero_cnh" name="numero_cnh" required placeholder="Número da Carteira Nacional de Habilitação">
        </div>
        <div class="campo">
          <label for="categoria_cnh">Categoria *</label>
          <input type="text" id="categoria_cnh" name="categoria_cnh" required placeholder="Ex: B, AB" maxlength="5">
        </div>
        <div class="campo campo-checkbox">
          <label>
            <input type="checkbox" name="ear" value="sim">
            EAR (Exerce Atividade Remunerada) — Tenho o exame psicotécnico do Detran
          </label>
        </div>
        <div class="campo">
          <label for="validade_cnh">Validade da CNH *</label>
          <input type="date" id="validade_cnh" name="validade_cnh" required>
        </div>
      </fieldset>

      <fieldset class="grupo-campos">
        <legend>Localização</legend>
        <div class="campo">
          <label for="cep">CEP</label>
          <input type="text" id="cep" name="cep" placeholder="00000-000 (opcional)" maxlength="9" inputmode="numeric">
        </div>
        <div class="campo">
          <label for="cidade">Cidade *</label>
          <input type="text" id="cidade" name="cidade" required placeholder="Ex: São Paulo">
        </div>
        <div class="campo">
          <label for="estado">Estado (UF) *</label>
          <input type="text" id="estado" name="estado" required placeholder="Ex: SP" maxlength="2" pattern="[A-Za-z]{2}">
        </div>
        <div class="campo">
          <label for="endereco_rua">Endereço</label>
          <input type="text" id="endereco_rua" placeholder="Rua / Avenida (opcional)">
          <input type="hidden" id="endereco" name="endereco">
        </div>
        <div class="campo">
          <label for="numero">Número</label>
          <input type="text" id="numero" placeholder="Número (opcional)">
        </div>
        <div class="campo">
          <label for="complemento">Complemento</label>
          <input type="text" id="complemento" placeholder="Apto, bloco, sala (opcional)">
        </div>
        <div class="campo">
          <label for="apps_que_usa">Apps que usa</label>
          <input type="text" id="apps_que_usa" name="apps_que_usa" placeholder="Ex: 99, Uber (opcional)">
        </div>
      </fieldset>

      <fieldset class="grupo-campos">
        <legend>Segurança</legend>
        <div class="campo campo-senha">
          <label for="senha">Senha *</label>
          <div class="input-senha-wrap">
            <input type="password" id="senha" name="senha" required placeholder="Mínimo 6 caracteres" minlength="6" autocomplete="new-password">
            <button type="button" class="toggle-senha" aria-label="Mostrar senha" data-target="senha" title="Mostrar senha">👁</button>
          </div>
        </div>
        <div class="campo campo-senha">
          <label for="confirmar_senha">Confirmar senha *</label>
          <div class="input-senha-wrap">
            <input type="password" id="confirmar_senha" required placeholder="Digite a senha novamente" minlength="6" autocomplete="new-password">
            <button type="button" class="toggle-senha" aria-label="Mostrar confirmar senha" data-target="confirmar_senha" title="Mostrar senha">👁</button>
          </div>
        </div>
      </fieldset>

      <div id="msg-erro-senha" class="msg-erro" style="display: none;"></div>

      <div class="acoes-formulario">
        <button type="submit" class="botao-enviar">Cadastrar</button>
      </div>
    </form>
  </main>

  <script src="js/validacoes.js"></script>
  <script>
    function configurarBuscaCepMotorista() {
      const cepInput = document.getElementById('cep');
      const cidadeInput = document.getElementById('cidade');
      const estadoInput = document.getElementById('estado');
      const enderecoRuaInput = document.getElementById('endereco_rua');

      if (!cepInput) return;

      cepInput.addEventListener('blur', async function () {
        const cepLimpo = this.value.replace(/\D/g, '');

        if (!cepLimpo) return;
        if (!Validacoes.cep(cepLimpo)) {
          Validacoes.mostrarErroInput(cepInput, 'CEP inválido');
          return;
        }

        try {
          const resposta = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
          if (!resposta.ok) return;

          const dados = await resposta.json();
          if (dados.erro) return;

          if (dados.localidade && !cidadeInput.value) {
            cidadeInput.value = dados.localidade;
          }
          if (dados.uf && !estadoInput.value) {
            estadoInput.value = dados.uf;
          }
          const logradouroBase = [dados.logradouro, dados.bairro].filter(Boolean).join(' - ');
          if (logradouroBase && !enderecoRuaInput.value) {
            enderecoRuaInput.value = `${logradouroBase}`;
          }
        } catch (e) {
          // Se der erro na consulta, apenas não preenche nada.
        }
      });
    }

    const form = document.querySelector('.formulario');
    const btnSubmit = document.querySelector('.botao-enviar');
    const msgErroForm = document.getElementById('msg-erro-senha');

    configurarBuscaCepMotorista();

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      Validacoes.limparTodosErros(form);
      
      let temErros = false;
      const cpfInput = document.getElementById('cpf');
      const emailInput = document.getElementById('email');
      const telefoneInput = document.getElementById('telefone');
      const whatsappInput = document.getElementById('whatsapp');
      const senhaInput = document.getElementById('senha');
      const cepInput = document.getElementById('cep');
      const enderecoRuaInput = document.getElementById('endereco_rua');
      const numeroInput = document.getElementById('numero');
      const complementoInput = document.getElementById('complemento');
      const enderecoHidden = document.getElementById('endereco');

      if (!Validacoes.cpf(cpfInput.value)) { Validacoes.mostrarErroInput(cpfInput, 'CPF inválido (11 números)'); temErros = true; }
      if (!Validacoes.email(emailInput.value)) { Validacoes.mostrarErroInput(emailInput, 'E-mail inválido'); temErros = true; }
      if (!Validacoes.telefone(telefoneInput.value)) { Validacoes.mostrarErroInput(telefoneInput, 'Formato: (11) 99999-9999'); temErros = true; }
      if (!Validacoes.telefone(whatsappInput.value)) { Validacoes.mostrarErroInput(whatsappInput, 'Formato: (11) 99999-9999'); temErros = true; }
      if (cepInput.value && !Validacoes.cep(cepInput.value)) { Validacoes.mostrarErroInput(cepInput, 'CEP inválido'); temErros = true; }
      if (!Validacoes.senha(senhaInput.value)) { Validacoes.mostrarErroInput(senhaInput, 'No mínimo 6 caracteres'); temErros = true; }

      const senha = senhaInput.value;
      const confirmar = document.getElementById('confirmar_senha').value;
      
      if (senha !== confirmar) {
        msgErroForm.textContent = 'As senhas não conferem. Digite novamente.';
        msgErroForm.style.display = 'block';
        return;
      }

      if (temErros) {
        msgErroForm.textContent = 'Por favor, corrija os erros apontados nos campos acima.';
        msgErroForm.style.display = 'block';
        return;
      }

      const partesEndereco = [];
      if (enderecoRuaInput.value.trim()) partesEndereco.push(enderecoRuaInput.value.trim());
      if (numeroInput.value.trim()) partesEndereco.push(`Nº ${numeroInput.value.trim()}`);
      if (complementoInput.value.trim()) partesEndereco.push(complementoInput.value.trim());
      enderecoHidden.value = partesEndereco.join(', ');
      
      msgErroForm.style.display = 'none';
      btnSubmit.disabled = true;
      btnSubmit.textContent = 'Cadastrando...';

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());

      try {
        const res = await fetch('/api/motoristas', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const json = await res.json();
        
        if (res.ok && json.sucesso) {
          window.location.href = '/?cadastro=motorista';
        } else {
          msgErroForm.textContent = json.erro || 'Erro ao cadastrar. Verifique os dados.';
          msgErroForm.style.display = 'block';
          btnSubmit.disabled = false;
          btnSubmit.textContent = 'Cadastrar';
        }
      } catch (err) {
        msgErroForm.textContent = 'Erro ao conectar. Tente novamente mais tarde.';
        msgErroForm.style.display = 'block';
        btnSubmit.disabled = false;
        btnSubmit.textContent = 'Cadastrar';
      }
    });

    document.querySelectorAll('.toggle-senha').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.target;
        const input = document.getElementById(id);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.textContent = '👁';
        btn.title = isPassword ? 'Ocultar senha' : 'Mostrar senha';
        btn.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
      });
    });
  </script>
</body>
</html>
