<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Locador - Locadora App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="cabecalho">
    <h1>Cadastro de Locador</h1>
    <p class="subtitulo">Preencha os dados da sua empresa para publicar veículos</p>
  </header>

  <main class="conteudo">
    <p class="voltar"><a href="/">← Voltar para a página inicial</a> | <a href="/login-locador">Já tem conta? Entrar</a></p>

    <!--
      PARA QUE SERVE O ATRIBUTO "name" EM CADA <input>?
      =================================================
      O "name" é como a ETIQUETA de cada dado. Quando o usuário clica em
      "Enviar", o navegador agrupa: nome do campo + valor digitado.
      Exemplo: { "razao_social": "Locadora ABC", "cnpj": "12345678000199" }
      O Backend recebe isso e sabe exatamente onde salvar cada informação.
      Sem o "name", o Backend receberia dados "sem identificação" — 
      não saberia o que é cada valor. É a "chave" que liga o formulário ao banco.
    -->

    <form class="formulario formulario-locador" action="/api/locadores" method="POST">
      <fieldset class="grupo-campos">
        <legend>Dados da empresa</legend>

        <div class="campo">
          <label for="razao_social">Razão Social *</label>
          <input type="text" id="razao_social" name="razao_social" required
                 placeholder="Nome oficial da empresa"
                 maxlength="150">
          <!-- name="razao_social" → Backend recebe esse identificador + valor -->
        </div>

        <div class="campo">
          <label for="nome_fantasia">Nome Fantasia</label>
          <input type="text" id="nome_fantasia" name="nome_fantasia"
                 placeholder="Nome comercial (opcional)"
                 maxlength="150">
          <!-- name="nome_fantasia" → Backend sabe onde guardar o nome fantasia -->
        </div>

        <div class="campo">
          <label for="cnpj">CNPJ *</label>
          <input type="text" id="cnpj" name="cnpj" required
                 placeholder="Apenas números (14 dígitos)"
                 pattern="[0-9]{14}"
                 maxlength="14"
                 inputmode="numeric">
          <!-- name="cnpj" → Backend identifica e valida o documento -->
        </div>
      </fieldset>

      <fieldset class="grupo-campos">
        <legend>Contato</legend>

        <div class="campo">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required
                 placeholder="contato@empresa.com.br">
          <!-- name="email" → Backend usa para login e notificações -->
        </div>

        <div class="campo">
          <label for="telefone">Telefone *</label>
          <input type="tel" id="telefone" name="telefone" required
                 placeholder="(11) 3333-4444">
          <!-- name="telefone" → Backend armazena para contato geral -->
        </div>

        <div class="campo">
          <label for="whatsapp">WhatsApp *</label>
          <input type="tel" id="whatsapp" name="whatsapp" required
                 placeholder="(11) 99999-8888">
          <!-- name="whatsapp" → Canal principal para motoristas entrarem em contato -->
        </div>
      </fieldset>

      <fieldset class="grupo-campos">
        <legend>Endereço</legend>

        <div class="campo">
          <label for="cep">CEP *</label>
          <input type="text" id="cep" name="cep" required
                 placeholder="00000-000"
                 maxlength="9"
                 inputmode="numeric">
          <!-- name="cep" → Backend valida e completa endereço (se integrar API) -->
        </div>

        <div class="campo">
          <label for="endereco_rua">Endereço *</label>
          <input type="text" id="endereco_rua" required
                 placeholder="Rua / Avenida">
          <input type="hidden" id="endereco" name="endereco">
          <!-- endereco_rua + número + complemento → juntamos em "endereco" antes de enviar -->
        </div>

        <div class="campo">
          <label for="numero">Número *</label>
          <input type="text" id="numero" required
                 placeholder="Número">
        </div>

        <div class="campo">
          <label for="complemento">Complemento</label>
          <input type="text" id="complemento"
                 placeholder="Apto, bloco, sala (opcional)">
        </div>

        <div class="linha-campos">
          <div class="campo">
            <label for="cidade">Cidade *</label>
            <input type="text" id="cidade" name="cidade" required
                   placeholder="Ex: São Paulo">
            <!-- name="cidade" → Backend usa para filtros e busca -->
          </div>
          <div class="campo">
            <label for="estado">Estado (UF) *</label>
            <input type="text" id="estado" name="estado" required
                   placeholder="Ex: SP"
                   maxlength="2"
                   pattern="[A-Za-z]{2}">
            <!-- name="estado" → Backend complementa localização -->
          </div>
        </div>
      </fieldset>

      <fieldset class="grupo-campos">
        <legend>Informações adicionais</legend>

        <div class="campo">
          <label for="area_atuacao">Área de atuação</label>
          <input type="text" id="area_atuacao" name="area_atuacao"
                 placeholder="Ex: São Paulo capital e região">
          <!-- name="area_atuacao" → Backend exibe para motoristas (opcional) -->
        </div>

        <div class="campo">
          <label for="horario_atendimento">Horário de atendimento</label>
          <input type="text" id="horario_atendimento" name="horario_atendimento"
                 placeholder="Ex: Seg-Sex 8h-18h">
          <!-- name="horario_atendimento" → Backend exibe para motoristas (opcional) -->
        </div>
      </fieldset>

      <fieldset class="grupo-campos">
        <legend>Segurança</legend>

        <div class="campo campo-senha">
          <label for="senha">Senha *</label>
          <div class="input-senha-wrap">
            <input type="password" id="senha" name="senha" required
                   placeholder="Mínimo 6 caracteres"
                   minlength="6"
                   autocomplete="new-password">
            <button type="button" class="toggle-senha" aria-label="Mostrar senha" data-target="senha" title="Mostrar senha">👁</button>
          </div>
        </div>

        <div class="campo campo-senha">
          <label for="confirmar_senha">Confirmar senha *</label>
          <div class="input-senha-wrap">
            <input type="password" id="confirmar_senha" required
                   placeholder="Digite a senha novamente"
                   minlength="6"
                   autocomplete="new-password">
            <button type="button" class="toggle-senha" aria-label="Mostrar confirmar senha" data-target="confirmar_senha" title="Mostrar senha">👁</button>
          </div>
        </div>
      </fieldset>

      <div id="msg-erro-senha" class="msg-erro" style="display: none;"></div>

      <div class="acoes-formulario">
        <button type="submit" class="botao-enviar">Cadastrar</button>
      </div>
    </form>
  </main>

  <script>
    function configurarBuscaCepLocadorCadastro() {
      const cepInput = document.getElementById('cep');
      const cidadeInput = document.getElementById('cidade');
      const estadoInput = document.getElementById('estado');
      const enderecoRuaInput = document.getElementById('endereco_rua');

      if (!cepInput) return;

      cepInput.addEventListener('blur', async function () {
        const cepLimpo = this.value.replace(/\D/g, '');
        if (!cepLimpo) return;
        if (cepLimpo.length !== 8) {
          return;
        }

        try {
          const resposta = await fetch(`https://viacep.com.br/ws/${cepLimpo}/json/`);
          if (!resposta.ok) return;
          const dados = await resposta.json();
          if (dados.erro) return;

          if (dados.localidade && !cidadeInput.value) {
            cidadeInput.value = dados.localidade;
          }
          if (dados.uf && !estadoInput.value) {
            estadoInput.value = dados.uf;
          }
          const logradouroBase = [dados.logradouro, dados.bairro].filter(Boolean).join(' - ');
          if (logradouroBase && !enderecoRuaInput.value) {
            enderecoRuaInput.value = `${logradouroBase}`;
          }
        } catch (e) {
          // Falha silenciosa na consulta de CEP
        }
      });
    }

    const form = document.querySelector('.formulario-locador');
    configurarBuscaCepLocadorCadastro();

    form.addEventListener('submit', function(e) {
      const senha = document.getElementById('senha').value;
      const confirmar = document.getElementById('confirmar_senha').value;
      const msgErro = document.getElementById('msg-erro-senha');
      if (senha !== confirmar) {
        e.preventDefault();
        msgErro.textContent = 'As senhas não conferem. Digite novamente.';
        msgErro.style.display = 'block';
        return;
      }

      const enderecoRua = document.getElementById('endereco_rua').value.trim();
      const numero = document.getElementById('numero').value.trim();
      const complemento = document.getElementById('complemento').value.trim();
      const enderecoHidden = document.getElementById('endereco');
      const partesEndereco = [];
      if (enderecoRua) partesEndereco.push(enderecoRua);
      if (numero) partesEndereco.push(`Nº ${numero}`);
      if (complemento) partesEndereco.push(complemento);
      enderecoHidden.value = partesEndereco.join(', ');
    });

    document.querySelectorAll('.toggle-senha').forEach(btn => {
      btn.addEventListener('click', function() {
        const id = this.dataset.target;
        const input = document.getElementById(id);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.textContent = '👁';
        btn.title = isPassword ? 'Ocultar senha' : 'Mostrar senha';
        btn.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
      });
    });
  </script>
</body>
</html>
