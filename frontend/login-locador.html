<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar como Locador - Locadora App</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="cabecalho">
    <h1>Entrar como Locador</h1>
    <p class="subtitulo">Use seu e-mail e senha para acessar o painel</p>
  </header>

  <main class="conteudo">
    <p class="voltar"><a href="/">← Voltar para a página inicial</a></p>

    <div id="msg-erro" class="msg-erro" style="display: none;"></div>

    <form class="formulario formulario-login" action="/api/login" method="POST">
      <fieldset class="grupo-campos">
        <div class="campo">
          <label for="email">E-mail *</label>
          <input type="email" id="email" name="email" required
                 placeholder="contato@empresa.com.br"
                 autocomplete="email">
        </div>

        <div class="campo">
          <label for="senha">Senha *</label>
          <input type="password" id="senha" name="senha" required
                 placeholder="Sua senha"
                 autocomplete="current-password">
        </div>
      </fieldset>

      <div class="acoes-formulario">
        <button type="submit" class="botao-enviar">Entrar</button>
      </div>
    </form>

    <p class="link-cadastro">
      Ainda não tem conta? <a href="/cadastro-locador.html">Cadastre-se como locador</a>
    </p>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const erro = params.get('erro');
    const msgErro = document.getElementById('msg-erro');
    const mensagens = {
      campos: 'Preencha e-mail e senha.',
      credenciais: 'E-mail ou senha incorretos. Tente novamente.',
      entrar: 'Faça login para acessar esta página.',
      servidor: 'Erro no servidor. Tente novamente mais tarde.'
    };
    if (erro && mensagens[erro]) {
      msgErro.textContent = mensagens[erro];
      msgErro.style.display = 'block';
    }
  </script>
</body>
</html>
